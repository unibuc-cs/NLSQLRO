### model
model_name_or_path: OpenLLM-Ro/RoLlama3.1-8b-Instruct

### method
stage: sft
do_train: true
finetuning_type: lora
lora_target: all

### dataset
dataset: queries_alpaca_ro
template: llama3
cutoff_len: 2048
max_samples: 10000
overwrite_cache: true
preprocessing_num_workers: 8

### output
output_dir: outputs/rolamma31_text2sql_queries_lora
logging_steps: 10
save_steps: 200
eval_steps: 200
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 1.0e-4
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true

### eval
val_size: 0.05
per_device_eval_batch_size: 1
eval_strategy: steps

### extras
report_to: none

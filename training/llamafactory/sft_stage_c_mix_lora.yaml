### model
model_name_or_path: OpenLLM-Ro/RoLlama3.1-8b-Instruct
adapter_name_or_path: outputs/rolamma31_stage_b_rogov_lora
trust_remote_code: true
flash_attn: fa2

### method
stage: sft
do_train: true
finetuning_type: lora
lora_target: all
create_new_adapter: false
lora_rank: 32
lora_alpha: 64
lora_dropout: 0.05
use_rslora: true

### dataset
dataset_dir: /mnt/home/fizlabrl/NLSQLRO/datasets/llamafactory
dataset: nlsqlro_rogov_sft,nlsqlro_external_all_sft
mix_strategy: interleave_under
interleave_probs: 0.8,0.2
template: llama3
cutoff_len: 4096
packing: true
neat_packing: false
overwrite_cache: true
preprocessing_num_workers: 8
dataloader_num_workers: 8

### output
output_dir: outputs/rolamma31_stage_c_mix_lora
run_name: rolamma31_stage_c_mix_lora
logging_dir: outputs/rolamma31_stage_c_mix_lora/tensorboard
logging_steps: 10
save_steps: 200
eval_steps: 200
plot_loss: true
overwrite_output_dir: true
save_only_model: false

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 2.0e-5
num_train_epochs: 200.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
ddp_timeout: 180000000
include_effective_tokens_per_second: true

### eval
val_size: 0.02
per_device_eval_batch_size: 2
eval_strategy: steps

### extras
report_to:
  - wandb
  - tensorboard
